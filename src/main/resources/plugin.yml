name: ManhuntPlugin
version: 1.0.0
main: com.manhunt.ManhuntPlugin
api-version: '1.16'
author: Swartzz
description: Automated Minecraft Manhunt system with tracking and role management

commands:
  manhunt:
    description: Main manhunt command
    aliases: [mh]
    usage: /<command> <start|stop|restart|pause|configure|addhunter|addrunner|remove|status>
  msgh:
    description: Hunter team chat
    usage: /<command> <message>
  msgr:
    description: Runner team chat
    usage: /<command> <message>